# scene
scene: gibson
scene_id:  ['Uvalda']
build_graph: true
load_texture: true
pybullet_load_texture: true
trav_map_type: no_obj
trav_map_resolution: 0.1
trav_map_erosion: 2
should_open_all_doors: true
mode : headless

# domain randomization
texture_randomization_freq: null
object_randomization_freq: null
train: false

# robot
robot:
  name: Locobot
  action_type: continuous
  action_normalize: true
  base_name: null
  scale: 1.0
  self_collision: false
  rendering_params: null
 
 
num_agents : 4

# task
task: ma_point_nav
target_dist_min: 1.0
target_dist_max: 10.0
goal_format: polar
task_obs_dim: 4

# reward
reward_type: geodesic
success_reward: 10.0
potential_reward_weight: 1.0

# discount factor
discount_factor: 0.99

# termination condition
dist_tol: 1.0  # body width
max_step: 160
max_collisions_allowed: 500

# misc config
initial_pos_z_offset: 0.1
collision_ignore_link_a_ids: [1, 2, 3, 4]  # ignore collisions with these robot links

# sensor spec
output: [panoramic,task_obs_point,proprioception]
fisheye: false

# image
# ASUS Xtion PRO LIVE
# https://www.asus.com/us/3D-Sensor/Xtion_PRO_LIVE
fisheye: false
image_width: 80
image_height: 80
vertical_fov: 90

# visual objects
visible_target: true
visible_path: false

sensor_noise: false
shared_reward: false
scenario: commongoal
training: test
reset_file_root: data/dataset
difficulty: hard
augment_data: false
